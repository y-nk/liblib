name: Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - run: pnpm install --frozen-lockfile

      - run: npx expo prebuild --clean --platform android --no-install
        env:
          EXPO_PUBLIC_COMMIT_SHA: ${{ github.sha }}

      - run: cd android && ./gradlew assembleRelease -quiet

      - uses: actions/upload-artifact@v4
        id: upload
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - run: |
          curl -s \
            -H "Title: LibLib Android build ready" \
            -H "Tags: white_check_mark,android" \
            -H "Click: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "Build ${{ github.sha }} finished. Download: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.upload.outputs.artifact-id }}" \
            https://ntfy.sh/liblib-build
