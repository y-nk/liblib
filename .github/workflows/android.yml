name: Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - run: pnpm install --frozen-lockfile

      - run: npx expo prebuild --clean --platform android --no-install

      - run: cd android && ./gradlew assembleRelease -quiet
        env:
          EXPO_PUBLIC_COMMIT_SHA: ${{ github.sha }}

      - uses: actions/upload-artifact@v4
        id: upload
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - if: always()
        run: |
          DURATION=$(( $(date +%s) - BUILD_START ))
          MINS=$(( DURATION / 60 ))
          SECS=$(( DURATION % 60 ))
          if [ "${{ job.status }}" = "success" ]; then
            TITLE="Android build ready"
            TAGS="white_check_mark,android"
            CLICK="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.upload.outputs.artifact-id }}"
            BODY="Build ${GITHUB_SHA::7} finished in ${MINS}m${SECS}s."
          else
            TITLE="Android build failed"
            TAGS="x,android"
            CLICK="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            BODY="Build ${GITHUB_SHA::7} failed after ${MINS}m${SECS}s."
          fi
          curl -s \
            -H "Title: $TITLE" \
            -H "Tags: $TAGS" \
            -H "Click: $CLICK" \
            -d "$BODY" \
            https://ntfy.sh/liblib-build
